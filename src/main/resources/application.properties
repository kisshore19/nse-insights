spring.application.name=nse-insights
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/nse_insights?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Batch insert for performance (loading ~2000 records per day)
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

nse.base-url=https://nseindia.com
nse.archive-url=https://archives.nseindia.com
nse.bhavacopy.url-template=https://nseindia.com/api/reports?archives=[{"name":"CM Bhavcopy","type":"daily","category":"capital_market","date":"{date}"}]&token=&type=daily&category=capital_market
nse.mto.url-template=https://nseindia.com/api/reports?archives=[{"name":"MTO","type":"daily","category":"capital_market","date":"{date}"}]&token=&type=daily&category=capital_market

# Timeout for NSE downloads (in seconds)
nse.download.timeout-seconds=30
nse.download.retry-attempts=3

logging.level.com.kisshore19.nseinsights=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n